<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACY2Book</title>
<style>
body{
  background:#0a0a0f;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}
.login-box{
  background:#1f1f2e;
  padding:30px;
  border-radius:12px;
  width:320px;
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#252535;
  border:1px solid #333;
  color:white;
  border-radius:6px;
}
button{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:#00c853;
  border:none;
  color:black;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
.hidden{
  display:none;
}
#app{
  text-align:center;
}
</style>
</head>
<body>

<div class="login-box" id="loginScreen">
  <h1>🏭 ACY2BOOK</h1>
  <p>2026 Departure Futures Market</p>

  <input id="loginName" placeholder="Enter your name">

  <button onclick="doLogin()">Enter the Book</button>
</div>

<div id="app" class="hidden">
  <h1>✅ Logged In</h1>
  <p id="welcomeText"></p>
</div>

<script>
function doLogin(){
  const name = document.getElementById("loginName").value.trim();

  if(!name){
    alert("Enter a name");
    return;
  }

  localStorage.setItem("acy2_name", name);

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("welcomeText").innerText =
    "Welcome to ACY2Book, " + name + "!";
}

window.onload = function(){
  const existing = localStorage.getItem("acy2_name");

  if(existing){
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("welcomeText").innerText =
      "Welcome back, " + existing + "!";
  }
}
</script>

</body>
</html>
